<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../scripts/js/dados_dispositivo.js"></script>

    <link rel="stylesheet" href="../styles/dados_dispositivos.css">
</head>
<body>
    <header>
        <h1>Monitoramento do Dispositivo</h1>
    </header>
    
    <main>
        <div class="sensor_ruido">
            <div class="grafico_container">
                <canvas id="grafico_ruido"></canvas>
            </div>
        </div>

        <div class="sensor_humidade">
            <div class="grafico_container">
                <canvas id="grafico_humidade"></canvas>
            </div>
        </div>
        
        <div class="sensor_temperatura">
            <div class="grafico_container">
                <canvas id="grafico_temperatura"></canvas>
            </div>
        </div>

        <div class="sensor_peso">
            <div class="grafico_container">
                <canvas id="grafico_peso"></canvas>
            </div>
        </div>

    </main>
</body>
</html>
